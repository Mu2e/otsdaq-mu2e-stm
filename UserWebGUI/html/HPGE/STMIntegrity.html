<!DOCTYPE HTML>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>STM DQM - HPGe Integrity</title>

  <link href="/WebPath/css/fonts.css?family=Comfortaa:400" rel="stylesheet">
  <link href="/WebPath/css/fonts.css?family=Inconsolata:400" rel="stylesheet">

  <link href="../../css/stm_layout.css" rel="stylesheet">
  <link href="../../css/stm_dqm.css" rel="stylesheet">

  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="../../js/stm_dqm.js"></script>

<script>
(function() {
  const theme = localStorage.getItem("theme") || "dark";
  if (theme === "light") {
    document.documentElement.classList.add("light");
  }
})();
</script>

</head>

<body>

<div id="banner" class="banner ok">System OK</div>

<div class="sidebar">

  <h2>HPGe DQM</h2>

  <div class="nav">

    <div id="themeToggle" class="theme-toggle" onclick="toggleTheme()">
      <i id="themeIcon" data-lucide="moon"></i>
      <span id="themeText">Dark Mode</span>
    </div>
    
    <div id="soundToggle" class="theme-toggle" onclick="toggleMute()">
      <i id="soundIcon" data-lucide="volume-2"></i>
      <span id="soundText">Sound ON</span>
    </div>

    <a class="home-link" href="../STMMain.html">
      <i data-lucide="home"></i> Home
    </a>

    <a href="../STMLABR.html">
      <i data-lucide="repeat"></i> Switch to LaBr
    </a>

    <a href="STMOverview.html">Overview</a>
    <a href="STMTrends.html">Trends</a>
    <a href="STMTiming.html">Timing</a>
    <a href="STMCorrelation.html">Correlation</a>
    <a class="active" href="STMIntegrity.html">Integrity</a>
    <a href="STMAlarms.html">Alarms</a>

    <div class="sec-label">SPECTRA</div>

    <a href="STMSpectra.html">
      <i data-lucide="activity"></i> Spectrum
    </a>

  </div>

</div>

<div class="main">

  <h1>Integrity</h1>

  <div id="lastUpdate" style="opacity:0.6; font-size:12px; margin-bottom:15px;">
    Updating...
  </div>

  <div class="grid">

    <div class="card">
      <h3>Event Continuity</h3>
      <div class="value" id="continuity">--</div>
    </div>

    <div class="card">
      <h3>Timing Consistency</h3>
      <div class="value" id="timing">--</div>
    </div>

    <div class="card">
      <h3>Clock Health</h3>
      <div class="value" id="clock">--</div>
    </div>

    <div class="card">
      <h3>Overall Integrity</h3>
      <div class="value" id="overall">--</div>
    </div>

  </div>

  <div class="alarm-box">
    <h3>Integrity Alarms</h3>
    <div id="alarms">Loading...</div>
  </div>

</div>

<script>

localStorage.setItem("lastPage", window.location.pathname + window.location.search);

async function update() {
    try {
        const data = await fetchSTM();

        const T = DQM_THRESHOLDS.timing;

        const events = data.window?.events ?? 0;
        const first  = data.window?.first_ewt ?? 0;
        const last   = data.window?.last_ewt ?? 0;

        const ewtSmall = data.timing?.ewt_small_jumps ?? 0;
        const ewtTrans = data.timing?.ewt_transition_issues ?? 0;

        const dtc = data.timing?.dtc_jumps ?? 0;
        const adc = data.timing?.adc_jumps ?? 0;

        // ===== Event Continuity =====
        let state = JSON.parse(localStorage.getItem("integrityState") || "{}");

        state.emptyCount = state.emptyCount || 0;

if (events === 0) {
    state.emptyCount++;
} else {
    state.emptyCount = 0;
}

localStorage.setItem("integrityState", JSON.stringify(state));

let continuityState = "ok";

if (state.emptyCount > 3) {
    continuityState = "bad";
}

        setCard("continuity",
            continuityState === "ok" ? "OK" : "NO FLOW",
            continuityState
        );

        // ===== Timing Consistency =====
        const timingVal = ewtSmall + ewtTrans;

        const timingState = getState(
            timingVal,
            T.ewt_small_warn,
            T.ewt_small_bad
        );

        setCard("timing",
            timingVal === 0 ? "OK" : timingVal,
            timingState
        );

        // ===== Clock Health =====
        const dtcState = getState(dtc, T.dtc_warn, T.dtc_bad);
        const adcState = getState(adc, T.adc_warn, T.adc_bad);

        let clockState = "ok";
        if (dtcState === "bad" || adcState === "bad") clockState = "bad";
        else if (dtcState === "warn" || adcState === "warn") clockState = "warn";

        let clockText = "OK";
        if (clockState !== "ok") {
            clockText = `DTC: ${dtc} | ADC: ${adc}`;
        }

        setCard("clock", clockText, clockState);

        // ===== Overall Integrity (composed logic) =====
        const states = [continuityState, timingState, clockState];

        let overallState = "ok";

        if (states.includes("bad")) overallState = "bad";
        else if (states.includes("warn")) overallState = "warn";

        setCard("overall",
            overallState === "ok" ? "OK" :
            overallState === "warn" ? "DEGRADED" : "BAD",
            overallState
        );

        // ===== Alarms =====
        renderAlarms("alarms", data.alarms, Object.keys(data.alarms));

        updateBanner(data);

        document.getElementById("lastUpdate").textContent =
          `Run ${data.run} | Subrun ${data.subrun} | ` +
          new Date(data.timestamp * 1000).toLocaleTimeString();

    } catch (err) {
        console.error(err);

        const banner = document.getElementById("banner");
        banner.classList.remove("ok");
        banner.classList.add("bad");
        banner.textContent = "DATA ERROR";
    }
}

window.addEventListener("load", () => {
    lucide.createIcons();
});

setInterval(update, 1000);
update();

</script>

</body>
</html>
