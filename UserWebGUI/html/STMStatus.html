<!DOCTYPE HTML>
<html lang="en">
<head>
    <title>STM Status</title>

    <!-- Fonts -->
    <link href="/WebPath/css/fonts.css?family=Inconsolata:400" rel="stylesheet">
    <link href="/WebPath/css/fonts.css?family=Comfortaa:400" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" type="text/css" href="/WebPath/css/ConfigurationAPI.css">

    <!-- OTS JS -->
    <script src="/WebPath/js/Globals.js"></script>
    <script src="/WebPath/js/Debug.js"></script>
    <script src="/WebPath/js/DesktopContent.js"></script>
    <script src="/WebPath/js/js_lib/ConfigurationAPI.js"></script>

    <style>
        body {
            margin: 0;
            background: #111;
            color: white;
        }

        #drawing {
            position: absolute;
            inset: 0;
        }

        #topBar {
            position: absolute;
            top: 5px;
            left: 5px;
            background: rgba(0,0,0,0.6);
            padding: 6px 10px;
            font-family: Inconsolata;
            font-size: 12px;
            border-radius: 4px;
            z-index: 20;
        }

        #topBar button {
            margin-right: 6px;
        }

        #alarmOverlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 10;
            display: none;
        }
    </style>
</head>

<body>

<div id="drawing"></div>
<div id="alarmOverlay"></div>

<div id="topBar">
    <button onclick="goMain()">Main</button>
    <button onclick="goFFT()">FFT</button>
    <button onclick="togglePolling()">Pause</button>
    <button onclick="updateGUI()">Reload</button>
    <span id="dqmStatus">Starting...</span>
</div>

<script type="module">
import {
    httpRequest,
    redraw,
    decodeUrl,
    registerForResize,
    GridDisplay
} from 'https://root.cern/js/latest/modules/main.mjs';

/* ===============================
   Navigation
   =============================== */

window.goMain = function () {
    window.location.href = 'STMMain.html';
};

window.goFFT = function () {
    window.location.href = 'STMFFT.html';
};

/* ===============================
   Configuration
   =============================== */

const cfg = (function () {
    const d = decodeUrl();
    return {
        monitor: parseInt(d.get('monitoring') || '200'),
        addr: d.get('addr') || '/WebPath/UserWebPath/json_dqm/c_stmdqm.json',
        opt: d.get('opt'),
        layout: d.get('layout'),
        autopause: d.get('autopause') === '1'
    };
})();

let mdi = null;
let polling = !cfg.autopause;
let busy = false;
let lastUpdate = 0;
let errorCount = 0;

/* ===============================
   UI helpers
   =============================== */

function updateStatus(text, color) {
    const el = document.getElementById('dqmStatus');
    el.textContent = text;
    el.style.color = color || 'white';
}

window.togglePolling = function () {
    polling = !polling;
    updateStatus(polling ? 'Running' : 'Paused');
};

/* ===============================
   Alarm logic
   =============================== */

function evaluateAlarms(canvas) {
    if (!canvas.alarms || !Array.isArray(canvas.alarms))
        return { level: 'OK', messages: [] };

    let level = 'OK';
    const messages = [];

    for (let i = 0; i < canvas.alarms.length; i++) {
        const a = canvas.alarms[i];
        const mode = a.mode || 'high';
        const value = a.value;

        if (value === undefined)
            continue;

        if (mode === 'high') {
            if (a.crit !== undefined && value >= a.crit) {
                level = 'CRIT';
                messages.push(a.name + ': ' + value + ' >= ' + a.crit);
            } else if (a.warn !== undefined && value >= a.warn) {
                if (level !== 'CRIT')
                    level = 'WARN';
                messages.push(a.name + ': ' + value + ' >= ' + a.warn);
            }
        }

        if (mode === 'low') {
            if (a.crit !== undefined && value <= a.crit) {
                level = 'CRIT';
                messages.push(a.name + ': ' + value + ' <= ' + a.crit);
            } else if (a.warn !== undefined && value <= a.warn) {
                if (level !== 'CRIT')
                    level = 'WARN';
                messages.push(a.name + ': ' + value + ' <= ' + a.warn);
            }
        }
    }

    return { level: level, messages: messages };
}

function showAlarmOverlay(level) {
    const o = document.getElementById('alarmOverlay');

    if (level === 'OK') {
        o.style.display = 'none';
        return;
    }

    o.style.display = 'block';
    o.style.border =
        (level === 'CRIT')
            ? '6px solid red'
            : '6px solid orange';
}

function updateAlarmStatus(alarm) {
    if (alarm.level === 'OK') {
        updateStatus(
            'OK ' + new Date(lastUpdate).toLocaleTimeString(),
            'lightgreen'
        );
    } else if (alarm.level === 'WARN') {
        updateStatus(
            'WARN ' + alarm.messages[0],
            'orange'
        );
    } else if (alarm.level === 'CRIT') {
        updateStatus(
            'CRIT ' + alarm.messages[0],
            'red'
        );
    }
}

/* ===============================
   Main update
   =============================== */

window.updateGUI = function () {
    if (busy || !polling)
        return;

    busy = true;

    httpRequest(cfg.addr, 'object')
        .then(function (canvas) {
            lastUpdate = Date.now();
            errorCount = 0;

            const alarm = evaluateAlarms(canvas);
            showAlarmOverlay(alarm.level);

            const frame = mdi
                ? mdi.findFrame('item0', true)
                : 'drawing';

            return redraw(frame, canvas, cfg.opt)
                .then(function () { return alarm; });
        })
        .then(function (alarm) {
            updateAlarmStatus(alarm);
            registerForResize('drawing');
        })
        .catch(function () {
            errorCount++;
            updateStatus(
                'Error (' + errorCount + ')',
                errorCount > 3 ? 'red' : 'orange'
            );
        })
        .finally(function () {
            busy = false;
        });
};

/* ===============================
   Stale watchdog
   =============================== */

setInterval(function () {
    if (!polling || !lastUpdate)
        return;

    const age = Date.now() - lastUpdate;
    if (age > 5 * cfg.monitor) {
        updateStatus(
            'STALE ' + Math.round(age / 1000) + 's',
            'red'
        );
    }
}, cfg.monitor);

/* ===============================
   Init
   =============================== */

if (cfg.layout)
    mdi = new GridDisplay('drawing', cfg.layout);

setInterval(function () {
    if (polling)
        updateGUI();
}, cfg.monitor);

</script>

</body>
</html>
