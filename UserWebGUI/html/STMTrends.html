<!DOCTYPE HTML>
<html lang="en">
  <head>
    <title>STM DQM - Trends</title>

    <link href="/WebPath/css/fonts.css?family=Comfortaa:400" rel="stylesheet">
    <link href="/WebPath/css/fonts.css?family=Inconsolata:400" rel="stylesheet">

    <link href="../css/stm_layout.css" rel="stylesheet">
    <link href="../css/stm_dqm.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@1.4.0"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="../js/stm_dqm.js"></script>
    
  </head>

  <body>

    <div id="banner" class="banner ok">System OK</div>

    <div class="sidebar">
      <h2>STM DQM</h2>

      <div class="nav">

        <div id="themeToggle" class="theme-toggle" onclick="toggleTheme()">
          <i id="themeIcon" data-lucide="moon"></i>
          <span id="themeText">Dark Mode</span>
        </div>
        
        <div id="soundToggle" class="theme-toggle" onclick="toggleMute()">
          <i id="soundIcon" data-lucide="volume-2"></i>
          <span id="soundText">Sound ON</span>
        </div>

        <a class="home-link" href="STMMain.html">
          <i data-lucide="home"></i> Home
        </a>

        <a href="STMOverview.html">Overview</a>
        <a class="active" href="STMTrends.html">Trends</a>
        <a href="STMTiming.html">Timing</a>
        <a href="STMCorrelation.html">Correlation</a>
        <a href="STMIntegrity.html">Integrity</a>
        <a href="STMAlarms.html">Alarms</a>
        
      </div>
    </div>

    <div class="main">

      <h1>Trends</h1>

      <div id="lastUpdate" style="opacity:0.6; font-size:12px; margin-bottom:15px;">
        Updating...
      </div>

      <div class="grid">

        <div class="card">
          <h3>Event Rate</h3>
          <canvas id="eventChart"></canvas>
        </div>

        <div class="card">
          <h3>Fragment Rate</h3>
          <canvas id="fragChart"></canvas>
        </div>

        <div class="card">
          <h3>Correlation Slope</h3>
          <canvas id="slopeChart"></canvas>
        </div>

        <div class="card">
          <h3>EWT Small Jumps</h3>
          <canvas id="ewtChart"></canvas>
        </div>

      </div>

    </div>

    <script>

      // ===== Persist page =====
      localStorage.setItem("lastPage", window.location.pathname + window.location.search);

      // ===== Config =====
      const MAX_POINTS = 100;

      // ===== Buffers =====
      const labels = [];
      const eventData = [];
      const fragData = [];
      const slopeData = [];
      const ewtData = [];

      // ===== Theme helpers =====
      function isLightMode() {
          return document.body.classList.contains("light");
      }

      function getThemeColors() {
          const isLight = isLightMode();

          return {
              grid: isLight ? "rgba(0,0,0,0.12)" : "rgba(255,255,255,0.25)",
              text: isLight ? "#222" : "#ddd",

              ok:  isLight ? "#065f46" : "#00ffaa",
              bad: isLight ? "#b91c1c" : "#ff5252",

              band: isLight 
                  ? "rgba(0,100,0,0.15)" 
                  : "rgba(0,255,170,0.12)",

              tooltipBg: isLight ? "#ffffff" : "#222",
              tooltipText: isLight ? "#000" : "#ddd"
          };
      }

      // ===== Chart builder =====
      function makeChart(ctx, extraOptions = {}) {

          const theme = getThemeColors();

          return new Chart(ctx, {
              type: 'line',
              data: {
                  labels: labels,
                  datasets: [{
                      data: [],
                      borderWidth: 2.5,
                      tension: 0.2,
                      pointRadius: 0,
                      pointHoverRadius: 4
                  }]
              },
              options: {
                  responsive: true,
                  animation: false,

                  interaction: {
                      mode: 'nearest',
                      intersect: false
                  },

                  scales: {
                      x: {
                          display: false,
                          grid: { color: theme.grid }
                      },
                      y: {
                          beginAtZero: true,
                          grid: { color: theme.grid },
                          ticks: { color: theme.text }
                      }
                  },

                  plugins: {
                      legend: { display: false },

                      tooltip: {
                          enabled: true,
                          backgroundColor: theme.tooltipBg,
                          titleColor: theme.tooltipText,
                          bodyColor: theme.tooltipText,
                          borderColor: theme.grid,
                          borderWidth: 1
                      },

                      annotation: extraOptions.annotation || {}
                  }
              }
          });
      }

      // ===== EWT chart =====
      function makeEWTChart(ctx) {

          const theme = getThemeColors();

          return new Chart(ctx, {
              type: 'line',
              data: {
                  labels: labels,
                  datasets: [{
                      data: [],
                      borderWidth: 2.5,
                      tension: 0.2,
                      pointRadius: 0,
                      pointHoverRadius: 4
                  }]
              },
              options: {
                  responsive: true,
                  animation: false,

                  interaction: {
                      mode: 'nearest',
                      intersect: false
                  },

                  scales: {
                      x: {
                          display: false,
                          grid: { color: theme.grid }
                      },
                      y: {
                          suggestedMin: -1,
                          suggestedMax: 1,
                          grid: { color: theme.grid },
                          ticks: { color: theme.text }
                      }
                  },

                  plugins: {
                      legend: { display: false },

                      tooltip: {
                          backgroundColor: theme.tooltipBg,
                          titleColor: theme.tooltipText,
                          bodyColor: theme.tooltipText
                      },

                      annotation: {
                          annotations: {
                              zeroLine: {
                                  type: 'line',
                                  yMin: 0,
                                  yMax: 0,
                                  borderColor: "#888",
                                  borderWidth: 2
                              }
                          }
                      }
                  }
              }
          });
      }

      // ===== Create charts =====
      const eventChart = makeChart(document.getElementById('eventChart'));
      const fragChart  = makeChart(document.getElementById('fragChart'));

      const slopeChart = makeChart(
          document.getElementById('slopeChart'),
          {
              annotation: {
                  annotations: {
                      normalBand: {
                          type: 'box',
                          yMin: 4800,
                          yMax: 5600,
                          backgroundColor: getThemeColors().band,
                          borderWidth: 0
                      }
                  }
              }
          }
      );

      const ewtChart = makeEWTChart(document.getElementById('ewtChart'));

      // ===== Register globally =====
      window.charts = [eventChart, fragChart, slopeChart, ewtChart];

      // ===== Theme update =====
      function applyThemeToChart(chart) {
          const theme = getThemeColors();

          chart.options.scales.x.grid.color = theme.grid;
          chart.options.scales.y.grid.color = theme.grid;
          chart.options.scales.y.ticks.color = theme.text;

          if (chart.options.plugins.annotation?.annotations?.normalBand) {
              chart.options.plugins.annotation.annotations.normalBand.backgroundColor = theme.band;
          }

          chart.update();
      }

      // ===== Update helper =====
      function updateChart(chart, values, color) {
          chart.data.labels = labels;
          chart.data.datasets[0].data = values;
          chart.data.datasets[0].borderColor = color;
          chart.update();
      }

      // ===== Update loop =====
      async function update() {

          try {
              const data = await fetchSTM();

              const t = new Date().toLocaleTimeString();

              const eventRate = data.rate.event_hz;
              const fragRate  = data.rate.fragment_hz;
              const slope     = data.correlation.slope;
              const ewt       = data.timing.ewt_small_jumps;

              labels.push(t);
              eventData.push(eventRate);
              fragData.push(fragRate);
              slopeData.push(slope);
              ewtData.push(ewt);

              if (labels.length > MAX_POINTS) {
                  labels.shift();
                  eventData.shift();
                  fragData.shift();
                  slopeData.shift();
                  ewtData.shift();
              }

              const theme = getThemeColors();

              updateChart(eventChart, eventData, eventRate < 1 ? theme.bad : theme.ok);
              updateChart(fragChart, fragData, eventRate < 1 ? theme.bad : theme.ok);
              updateChart(slopeChart, slopeData, (slope < 4800 || slope > 5600) ? theme.bad : theme.ok);
              updateChart(ewtChart, ewtData, ewt > 0 ? theme.bad : theme.ok);

              updateBanner(data);
              updateTimestamp();

          } catch (err) {
              console.error(err);

              const banner = document.getElementById("banner");
              banner.classList.remove("ok");
              banner.classList.add("bad");
              banner.textContent = "DATA ERROR";
          }
      }

      // ===== Apply theme on load =====
      window.addEventListener("load", () => {
          if (window.charts) {
              window.charts.forEach(c => applyThemeToChart(c));
          }
      });

      setInterval(update, 1000);
      update();

    </script>

  </body>
</html>
