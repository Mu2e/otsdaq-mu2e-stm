<!DOCTYPE HTML>
<html lang="en">
<head>
    <title>STM DQM</title>

    <link href="/WebPath/css/fonts.css?family=Comfortaa:400" rel="stylesheet">
    <link href="/WebPath/css/fonts.css?family=Inconsolata:400" rel="stylesheet">

    <style>
        body {
            margin: 0;
            height: 100vh;
            background: #111;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Comfortaa;
        }

        .container {
            text-align: center;
        }

        h1 {
            margin-bottom: 40px;
            font-size: 32px;
        }

        .btn {
            display: block;
            width: 260px;
            margin: 15px auto;
            padding: 14px;
            font-size: 16px;
            font-family: Inconsolata;
            background: #222;
            color: white;
            border: 2px solid #444;
            border-radius: 6px;
            cursor: pointer;
        }

        .btn:hover {
            background: #333;
            border-color: #777;
        }

        .hint {
            margin-top: 30px;
            font-size: 12px;
            opacity: 0.6;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>STM DQM</h1>

    <button class="btn" onclick="openPage('STMStatus.html')">
        Status & Alarms
    </button>

    <button class="btn" onclick="openPage('STMFFT.html')">
        FFT Diagnostics
    </button>

    <div class="hint">
        Monitoring & diagnostics
    </div>
</div>

<script>
function openPage(page) {
    // Forward query parameters (addr, monitoring, etc.)
    const params = window.location.search;
    window.open(page + params, '_blank');
}
</script>

</body>
</html>
